<!-- main\templates\quiz\quiz_planning_snippet.html -->
{% load static %}
<div class="quiz-snippet" data-quiz-type="planning">
    <button class="quiz-close" style="float:right; background:none; border:none; font-size:1.2em; cursor:pointer;">&times;</button>
    
    <div id="quiz-container">
        <p id="question">Загрузка...</p>
        <div id="options"></div>
        <p id="result"></p>
        <button id="next-btn" style="display:none;">Следующий</button>
    </div>
    
    <script type="application/json" id="quiz-config">
    {"endpoint": "/api/get-planning-quiz/", "quizType": "planning"}
    </script>
</div>
